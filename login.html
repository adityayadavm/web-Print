<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrintFlow Login | Premium SaaS Printing</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #a5b4fc;
            --dark: #1e293b;
            --text-gray: #64748b;
            --bg-body: #f8fafc;
            --white: #ffffff;
            --shadow-soft: 0 20px 40px -10px rgba(0,0,0,0.08);
            --error: #ef4444;
            --success: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--dark);
            position: relative;
            overflow: hidden;
        }

        /* Abstract ambient gradient background */
        .ambient-glow1 {
            position: absolute;
            top: -10%; left: -10%;
            width: 50vw; height: 50vw;
            background: radial-gradient(circle, rgba(79, 70, 229, 0.15) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
            z-index: 0;
        }

        .ambient-glow2 {
            position: absolute;
            bottom: -20%; right: -10%;
            width: 60vw; height: 60vw;
            background: radial-gradient(circle, rgba(165, 180, 252, 0.2) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
            z-index: 0;
        }

        /* Back Button */
        .back-btn {
            position: absolute;
            top: 40px;
            left: 5%;
            text-decoration: none;
            color: var(--text-gray);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 10;
            transition: color 0.3s ease;
        }

        .back-btn:hover {
            color: var(--primary);
        }

        /* Glass Card */
        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 100%;
            max-width: 420px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: var(--shadow-soft);
            border: 1px solid rgba(255,255,255,0.8);
            z-index: 1;
            position: relative;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 30px;
        }
        
        .logo span {
            color: var(--primary);
        }

        /* Toggle Button */
        .toggle-box {
            display: flex;
            background: #f1f5f9;
            border-radius: 12px;
            margin-bottom: 24px;
            position: relative;
            padding: 4px;
        }

        .toggle-btn {
            flex: 1;
            border: none;
            background: transparent;
            padding: 10px 0;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-gray);
            cursor: pointer;
            z-index: 2;
            transition: color 0.3s ease;
            position: relative;
        }

        .toggle-btn.active {
            color: var(--primary);
        }

        .toggle-slider {
            position: absolute;
            top: 4px;
            left: 4px;
            width: calc(50% - 4px);
            height: calc(100% - 8px);
            background: var(--white);
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            z-index: 1;
        }

        /* Form Elements */
        .form-area {
            display: none;
            animation: formTransition 0.4s ease;
        }

        .form-area.active {
            display: block;
        }

        @keyframes formTransition {
            from { opacity: 0; transform: translateX(10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .input-group {
            margin-bottom: 16px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--dark);
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            color: var(--dark);
            background: var(--bg-body);
            transition: all 0.3s ease;
            outline: none;
        }

        .input-group input:focus {
            border-color: var(--primary-light);
            background: var(--white);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), #6366f1);
            color: var(--white);
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 8px 20px -6px rgba(79, 70, 229, 0.5);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px -8px rgba(79, 70, 229, 0.6);
        }

        .btn-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .loader {
            display: none;
            width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-bottom-color: white;
            border-radius: 50%;
            animation: rotate 1s linear infinite;
        }

        @keyframes rotate {
            to { transform: rotate(360deg); }
        }

        /* Toast Notifications */
        .toast {
            position: fixed;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--dark);
            color: var(--white);
            padding: 14px 24px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }

        .toast.show {
            bottom: 40px;
        }

        .toast.error { background: var(--error); }
        .toast.success { background: var(--success); }

    </style>
</head>
<body>

    <div class="ambient-glow1"></div>
    <div class="ambient-glow2"></div>

    <a href="index.html" class="back-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Back to Home
    </a>

    <div class="card">
        <div class="logo">
            Print<span>Flow</span>
        </div>

        <div class="toggle-box">
            <div class="toggle-slider" id="toggleSlider"></div>
            <button class="toggle-btn active" id="btnShowLogin">Login</button>
            <button class="toggle-btn" id="btnShowRegister">Register</button>
        </div>

        <!-- Login Form -->
        <div id="loginArea" class="form-area active">
            <form id="loginForm">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="loginEmail" placeholder="you@example.com" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-submit" id="loginSubmitBtn">
                    <span id="loginBtnText">Sign In</span>
                    <div class="loader" id="loginLoader"></div>
                </button>
            </form>
        </div>

        <!-- Register Form -->
        <div id="registerArea" class="form-area">
            <form id="registerForm">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="regName" placeholder="Enter your full name" required>
                </div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="regEmail" placeholder="you@example.com" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" placeholder="Create a password" minlength="6" required>
                </div>
                <button type="submit" class="btn-submit" id="regSubmitBtn">
                    <span id="regBtnText">Create Account</span>
                    <div class="loader" id="regLoader"></div>
                </button>
            </form>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <!-- ✅ FIREBASE INTEGRATION SECTION (No import statements) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

    <script>
        // Provided Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyCYnzd9oR7oGBroR06tIddkctZbAEu7Mrc",
            authDomain: "print-app-60178.firebaseapp.com",
            projectId: "print-app-60178",
            storageBucket: "print-app-60178.firebasestorage.app",
            messagingSenderId: "947731089469",
            appId: "1:947731089469:web:d65b9200d3fca60de84254",
            measurementId: "G-B7J1L4F3HJ"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // --- UI Logic ---
        const btnShowLogin = document.getElementById("btnShowLogin");
        const btnShowRegister = document.getElementById("btnShowRegister");
        const toggleSlider = document.getElementById("toggleSlider");
        const loginArea = document.getElementById("loginArea");
        const registerArea = document.getElementById("registerArea");

        btnShowLogin.addEventListener("click", () => {
            btnShowLogin.classList.add("active");
            btnShowRegister.classList.remove("active");
            toggleSlider.style.transform = "translateX(0)";
            registerArea.classList.remove("active");
            setTimeout(() => loginArea.classList.add("active"), 50);
        });

        btnShowRegister.addEventListener("click", () => {
            btnShowRegister.classList.add("active");
            btnShowLogin.classList.remove("active");
            toggleSlider.style.transform = "translateX(100%)";
            loginArea.classList.remove("active");
            setTimeout(() => registerArea.classList.add("active"), 50);
        });

        // Toast functionality
        function showToast(message, type = 'success') {
            const toast = document.getElementById("toast");
            toast.textContent = message;
            toast.className = `toast show ${type}`;
            setTimeout(() => toast.classList.remove("show"), 4000);
        }

        // --- Firebase Auth Logic ---

        // Registration Handler
        document.getElementById("registerForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = document.getElementById("regSubmitBtn");
            const text = document.getElementById("regBtnText");
            const loader = document.getElementById("regLoader");
            
            const name = document.getElementById("regName").value;
            const email = document.getElementById("regEmail").value;
            const password = document.getElementById("regPassword").value;

            // Loading state
            btn.disabled = true;
            text.style.display = 'none';
            loader.style.display = 'block';

            try {
                // Create user using compat function
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;

                // Update Name
                await user.updateProfile({ displayName: name });

                // Send Email Verification
                await user.sendEmailVerification();

                // Sign out so they have to login after verifying
                await auth.signOut();

                // Success
                document.getElementById("registerForm").reset();
                showToast(`Verification email sent to ${email}`, 'success');
                
                // Switch back to login view smoothly
                setTimeout(() => btnShowLogin.click(), 2000);
                
            } catch (error) {
                console.error("Register Error:", error);
                
                // Formulate user-friendly error messages
                let errorMsg = "Failed to create account.";
                if (error.code === 'auth/email-already-in-use') errorMsg = "Email is already registered.";
                if (error.code === 'auth/weak-password') errorMsg = "Password should be at least 6 characters.";
                if (error.code === 'auth/invalid-email') errorMsg = "Invalid email format.";

                showToast(errorMsg, 'error');
            } finally {
                btn.disabled = false;
                text.style.display = 'block';
                loader.style.display = 'none';
            }
        });

        // Login Handler
        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = document.getElementById("loginSubmitBtn");
            const text = document.getElementById("loginBtnText");
            const loader = document.getElementById("loginLoader");

            const email = document.getElementById("loginEmail").value;
            const password = document.getElementById("loginPassword").value;

            // Loading state
            btn.disabled = true;
            text.style.display = 'none';
            loader.style.display = 'block';

            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;

                if (!user.emailVerified) {
                    // Must be verified
                    await auth.signOut();
                    showToast("Please verify your email before logging in.", 'error');
                } else {
                    showToast("Login successful!", 'success');
                    // Redirect to dashboard
                    setTimeout(() => {
                        window.location.href = "dashboard.html";
                    }, 1000);
                }

            } catch (error) {
                console.error("Login Error:", error);
                
                let errorMsg = "Failed to sign in. Check your credentials.";
                if (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password') {
                    errorMsg = "Invalid email or password.";
                }

                showToast(errorMsg, 'error');
            } finally {
                btn.disabled = false;
                text.style.display = 'block';
                loader.style.display = 'none';
            }
        });
    </script>

</body>
</html>
