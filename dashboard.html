<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrintFlow | Dashboard</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- QRCode.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #a5b4fc;
            --dark: #1e293b;
            --text-gray: #64748b;
            --bg-body: #f8fafc;
            --white: #ffffff;
            --shadow-soft: 0 10px 40px -10px rgba(0,0,0,0.08);
            --shadow-hover: 0 15px 40px -10px rgba(79, 70, 229, 0.15);
            --card-bg: rgba(255, 255, 255, 0.95);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--dark);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Abstract ambient background */
        .ambient-glow1 {
            position: fixed;
            top: -15%; left: -10%;
            width: 60vw; height: 60vw;
            background: radial-gradient(circle, rgba(79, 70, 229, 0.08) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
            z-index: -1;
            pointer-events: none;
        }

        .ambient-glow2 {
            position: fixed;
            bottom: -20%; right: -10%;
            width: 70vw; height: 70vw;
            background: radial-gradient(circle, rgba(165, 180, 252, 0.1) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
            z-index: -1;
            pointer-events: none;
        }

        /* Full page Auth Loader */
        #pageLoader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-body);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 40px; height: 40px;
            border: 4px solid var(--primary-light);
            border-bottom-color: var(--primary);
            border-radius: 50%;
            animation: rotate 1s linear infinite;
        }

        @keyframes rotate { to { transform: rotate(360deg); } }

        /* Navbar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--dark);
            text-decoration: none;
        }
        .logo span { color: var(--primary); }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-email {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-gray);
            display: none; /* hidden on small mobile */
        }
        @media (min-width: 600px) { .user-email { display: block; } }

        .btn-logout {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: none;
            padding: 8px 18px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-logout:hover {
            background: rgba(239, 68, 68, 0.2);
            transform: translateY(-2px);
        }

        /* Main Setup */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 50px 5%;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s ease;
        }

        .container.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .welcome-header {
            margin-bottom: 40px;
        }
        .welcome-header h1 {
            font-size: 32px;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 8px;
        }
        .welcome-header h1 span {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .welcome-header p {
            color: var(--text-gray);
            font-size: 15px;
        }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        /* Glass Cards */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.8);
            padding: 30px;
            border-radius: 20px;
            box-shadow: var(--shadow-soft);
            transition: all 0.3s ease;
        }

        .card:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-5px);
        }

        .card h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Shop Card Specifics */
        .shop-id-box {
            background: rgba(79, 70, 229, 0.05);
            border: 1px dashed rgba(79, 70, 229, 0.3);
            padding: 12px 16px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .shop-id-box strong { font-family: monospace; color: var(--primary); font-size: 16px; }
        .shop-id-box span { font-size: 13px; color: var(--text-gray); }

        .qr-placeholder {
            width: 150px;
            height: 150px;
            background: var(--bg-body);
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-gray);
            font-size: 13px;
            flex-direction: column;
            gap: 10px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        /* Quick Actions Specifics */
        .action-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .btn-action {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            padding: 16px;
            background: var(--white);
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            color: var(--dark);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .btn-action:hover {
            border-color: var(--primary-light);
            background: rgba(79, 70, 229, 0.02);
            color: var(--primary);
        }

        .btn-action svg {
            width: 20px; height: 20px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round; stroke-linejoin: round;
        }

        /* Toast Notifications */
        .toast {
            position: fixed;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            background: #10b981;
            color: var(--white);
            padding: 14px 24px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }

        .toast.show {
            bottom: 40px;
        }

    </style>
</head>
<body>

    <!-- Ambient Glows -->
    <div class="ambient-glow1"></div>
    <div class="ambient-glow2"></div>

    <!-- Initial Loading State -->
    <div id="pageLoader">
        <div class="spinner"></div>
    </div>

    <!-- Navbar -->
    <nav>
        <a href="#" class="logo">Print<span>Flow</span></a>
        <div class="nav-right">
            <span class="user-email" id="displayEmail">loading...</span>
            <button class="btn-logout" id="btnLogout">Logout</button>
        </div>
    </nav>

    <!-- Main Dashboard Content -->
    <div class="container" id="dashboardContent">
        
        <div class="welcome-header">
            <h1>Welcome back, <span id="welcomeEmail">...</span></h1>
            <p>Manage your print queue and shop configurations.</p>
        </div>

        <div class="grid">
            
            <!-- Card: Your Shop -->
            <div class="card">
                <h2>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--primary);"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    Your Shop Configuration
                </h2>
                
                <div class="shop-id-box">
                    <span>Shop ID:</span>
                    <strong id="shopIdMock">Loading...</strong>
                </div>

                <div id="qrBox" class="qr-placeholder" style="border: none; background: transparent; box-shadow: none;">
                    <div class="spinner" style="width: 24px; height: 24px; border-width: 3px;"></div>
                </div>

                <button id="btnDownloadQR" class="btn-action" style="margin-top: 15px; display: none; justify-content: center; background: rgba(79, 70, 229, 0.1); color: var(--primary); border: none;">
                    Download QR Code
                </button>
            </div>

            <!-- Card: Quick Actions -->
            <div class="card">
                <h2>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--primary);"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                    Quick Actions
                </h2>
                
                <div class="action-list">
                    <a href="app.html" id="linkUploadApp" class="btn-action">
                        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                        Open Upload Page (Public View)
                    </a>
                    
                    <a href="admin.html" id="linkAdminUi" class="btn-action">
                        <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
                        View Orders (Admin Console)
                    </a>
                </div>
            </div>

        </div>
    </div>

    <!-- ✅ FIREBASE INTEGRATION SECTION (Compat / No imports) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <script>
        // Provided Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyCYnzd9oR7oGBroR06tIddkctZbAEu7Mrc",
            authDomain: "print-app-60178.firebaseapp.com",
            projectId: "print-app-60178",
            storageBucket: "print-app-60178.firebasestorage.app",
            messagingSenderId: "947731089469",
            appId: "1:947731089469:web:d65b9200d3fca60de84254",
            measurementId: "G-B7J1L4F3HJ"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const pageLoader = document.getElementById('pageLoader');
        const dashboardContent = document.getElementById('dashboardContent');
        const displayEmail = document.getElementById('displayEmail');
        const welcomeEmail = document.getElementById('welcomeEmail');
        const btnLogout = document.getElementById('btnLogout');

        // Toast functionality
        function showToast(message) {
            let toast = document.getElementById("toast");
            if (!toast) {
                toast = document.createElement("div");
                toast.id = "toast";
                toast.className = "toast";
                document.body.appendChild(toast);
            }
            toast.textContent = message;
            toast.classList.add("show");
            setTimeout(() => toast.classList.remove("show"), 4000);
        }

        function generateRandomShopId() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let id = 'PF-';
            for (let i = 0; i < 4; i++) {
                id += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return id;
        }

        async function initShopConfig(user) {
            try {
                const docRef = db.collection("shops").doc(user.uid);
                const docSnap = await docRef.get();
                let shopId = null;

                if (docSnap.exists) {
                    shopId = docSnap.data().shopId;
                } else {
                    shopId = generateRandomShopId();
                    await docRef.set({
                        uid: user.uid,
                        email: user.email,
                        shopId: shopId,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    showToast("Shop created successfully");
                }

                document.getElementById('shopIdMock').textContent = shopId;

                // Build QR Code
                const qrBox = document.getElementById('qrBox');
                qrBox.innerHTML = ''; // clear loading spinner
                
                const uploadUrl = "https://adityayadavm.github.io/web-Print/?shop=" + shopId;

                new QRCode(qrBox, {
                    text: uploadUrl,
                    width: 150,
                    height: 150,
                    colorDark : "#1e293b",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });

                // Dynamically bind shop params to the Quick Action buttons
                document.getElementById('linkUploadApp').href = `app.html?shop=${shopId}`;
                document.getElementById('linkAdminUi').href = `admin.html?shop=${shopId}`;

                // Allow UI to paint the canvas before we setup download
                setTimeout(() => {
                    const btnDownload = document.getElementById("btnDownloadQR");
                    btnDownload.style.display = "flex";
                    btnDownload.onclick = () => {
                        const img = qrBox.querySelector('img');
                        if (img && img.src) {
                            const a = document.createElement("a");
                            a.href = img.src;
                            a.download = shopId + "_QRCode.png";
                            a.click();
                        } else {
                            // fallback if canvas rendered but img isn't populated
                            const canvas = qrBox.querySelector('canvas');
                            if(canvas) {
                                const a = document.createElement("a");
                                a.href = canvas.toDataURL("image/png");
                                a.download = shopId + "_QRCode.png";
                                a.click();
                            }
                        }
                    };
                }, 500);

            } catch (error) {
                console.error("Error setting up shop:", error);
                document.getElementById('shopIdMock').textContent = "Error";
                document.getElementById('qrBox').innerHTML = "Failed to load QR.";
            }
        }

        // Firebase Auth State Listener
        auth.onAuthStateChanged((user) => {
            if (user) {
                // Check if verified (double-check protection)
                if(!user.emailVerified) {
                    auth.signOut().then(() => {
                        window.location.href = "login.html";
                    });
                    return;
                }

                // They are logged in and verified
                displayEmail.textContent = user.email;
                welcomeEmail.textContent = user.displayName || user.email;
                
                // Initialize Firestore Shop Configurations
                initShopConfig(user);
                
                // Fade out loader, fade in content
                pageLoader.style.opacity = '0';
                setTimeout(() => {
                    pageLoader.style.display = 'none';
                    dashboardContent.classList.add('visible');
                }, 500);

            } else {
                // Not logged in -> send to login
                window.location.href = "login.html";
            }
        });

        // Logout Event
        btnLogout.addEventListener("click", () => {
            auth.signOut().then(() => {
                window.location.href = "login.html";
            }).catch((error) => {
                console.error("Sign out error", error);
                alert("Failed to sign out.");
            });
        });
    </script>
</body>
</html>
